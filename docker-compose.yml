version: '3.8'

services:
  vision_orchestrator:
    build: .
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - CUDA_VISIBLE_DEVICES=0,1,2,3
      - LOG_LEVEL=DEBUG
      - MUJOCO_GL=egl
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - enterprise_network

networks:
  enterprise_network:
    driver: bridge
